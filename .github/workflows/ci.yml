name: CI

on:
  push:
    branches-ignore:
      - "wip*"
  pull_request:

jobs:
  check-conventional-commits:
    name: Check Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: webiny/action-conventional-commits@v1.4.2

  check-changelog:
    name: "Check Changelog"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate Changelog
        id: generate-changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
        env:
          OUTPUT: CHANGELOG_UP.md
          GITHUB_REPO: ${{ github.repository }}
      - name: Check Changelog
        id: check-changelog
        run: diff -u CHANGELOG.md CHANGELOG_UP.md

  list-commits:
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.list-commits.outputs.commits }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.
        id: list-commits

  typos_checks:
    needs: list-commits
    strategy:
      matrix:
        commit: ${{ fromJSON(needs.list-commits.outputs.commits) }}

    name: "Typos ${{ matrix.commit.message }}"
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.commit.id }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: "${{ matrix.commit.id }}"
      - name: Check spelling of entire workspace
        uses: crate-ci/typos@master
